version: '3.4'

services:
  device1:
    build:
        context: .
        dockerfile: Dockerfile.test.bacnet
    image: volttron/test-setup:bacnet
    container_name: device1
    hostname: device1
    environment:
        - BACNET_DEVICE_IP_ADDR=172.28.5.1
    networks:
        bacnet_network:
            ipv4_address: 172.28.5.1

  device2:
    depends_on:
      - device1
    image: volttron/test-setup:bacnet
    container_name: device2
    hostname: device2
    environment:
        - BACNET_DEVICE_IP_ADDR=172.28.5.2
    networks:
      bacnet_network:
        ipv4_address: 172.28.5.2

networks:
  bacnet_network:
    name: bacnet_network
    driver: bridge
    ipam:
     config:
       - subnet: 172.28.0.0/16
         ip_range: 172.28.5.0/24
